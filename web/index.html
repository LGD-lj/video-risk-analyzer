<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频风险点分析系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #0f0c29, #1a1a3e, #24243e);
            min-height: 100vh;
            color: #e0e0e0;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        .header h1 {
            font-size: 2em;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }
        .header .subtitle {
            color: #888;
            font-size: 0.95em;
        }

        .card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 24px;
            backdrop-filter: blur(10px);
        }

        .upload-area {
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 12px;
            padding: 50px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .upload-area:hover, .upload-area.drag-over {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.1);
        }
        .upload-area.has-file {
            border-style: solid;
            border-color: #4ade80;
            background: rgba(74, 222, 128, 0.1);
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        .upload-text {
            color: #aaa;
            font-size: 1.05em;
            margin-bottom: 8px;
        }
        .upload-hint {
            color: #666;
            font-size: 0.85em;
        }
        .file-name {
            color: #4ade80;
            font-weight: 600;
            margin-top: 12px;
            font-size: 0.95em;
        }

        #fileInput { display: none; }

        .btn {
            display: inline-block;
            padding: 12px 32px;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.3s ease;
            text-decoration: none;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            width: 100%;
        }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-download {
            background: rgba(74, 222, 128, 0.15);
            color: #4ade80;
            border: 1px solid rgba(74, 222, 128, 0.3);
            padding: 8px 20px;
            font-size: 0.9em;
            margin: 4px;
        }
        .btn-download:hover {
            background: rgba(74, 222, 128, 0.25);
        }

        .progress-container {
            margin-top: 20px;
        }
        .progress-bar-bg {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            height: 12px;
            overflow: hidden;
            margin-bottom: 8px;
        }
        .progress-bar-fill {
            height: 100%;
            border-radius: 10px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            transition: width 0.5s ease;
            width: 0%;
        }
        .progress-text {
            display: flex;
            justify-content: space-between;
            font-size: 0.85em;
            color: #888;
        }
        .progress-stage {
            color: #667eea;
            font-weight: 500;
        }

        .result-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }
        .info-item {
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            padding: 12px 16px;
        }
        .info-label {
            font-size: 0.8em;
            color: #888;
            margin-bottom: 4px;
        }
        .info-value {
            font-size: 1.1em;
            font-weight: 600;
            color: #e0e0e0;
        }

        .download-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .error-message {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 8px;
            padding: 16px;
            color: #f87171;
            font-size: 0.9em;
            white-space: pre-wrap;
            max-height: 200px;
            overflow-y: auto;
        }

        .hidden { display: none !important; }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #ef4444;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 0.9em;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .footer {
            text-align: center;
            color: #555;
            font-size: 0.8em;
            margin-top: 40px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <h1>🎬 视频风险点分析系统</h1>
            <p class="subtitle">上传行车记录视频 → AI 智能识别风险 → 生成报告</p>
        </div>

        <!-- 上传区 -->
        <div class="card" id="uploadCard">
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📤</div>
                <div class="upload-text">点击上传或拖拽视频文件到此处</div>
                <div class="upload-hint">支持 MP4、MOV、AVI、MKV、WebM 格式（最大 2GB）</div>
                <div class="file-name hidden" id="fileName"></div>
            </div>
            <input type="file" id="fileInput" accept="video/mp4,video/mov,video/avi,video/x-msvideo,video/mkv,video/webm">
            <button class="btn btn-primary hidden" id="uploadBtn" style="margin-top:16px">🚀 开始分析</button>
        </div>

        <!-- 进度区 -->
        <div class="card hidden" id="progressCard">
            <h3 style="margin-bottom:16px">⏳ 分析进度</h3>
            <div class="progress-container">
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="progressBar"></div>
                </div>
                <div class="progress-text">
                    <span class="progress-stage" id="progressStage">准备中...</span>
                    <span id="progressPercent">0%</span>
                </div>
            </div>
            <p id="progressMessage" style="margin-top:8px; color:#888; font-size:0.85em"></p>
        </div>

        <!-- 结果区 -->
        <div class="card hidden" id="resultCard">
            <h3 style="margin-bottom:16px">✅ 分析完成</h3>
            <div class="result-info">
                <div class="info-item">
                    <div class="info-label">文件名</div>
                    <div class="info-value" id="resultFilename">-</div>
                </div>
                <div class="info-item">
                    <div class="info-label">视频时长</div>
                    <div class="info-value" id="resultDuration">-</div>
                </div>
                <div class="info-item">
                    <div class="info-label">分辨率</div>
                    <div class="info-value" id="resultResolution">-</div>
                </div>
                <div class="info-item">
                    <div class="info-label">风险点数量</div>
                    <div class="info-value" id="resultRiskCount">-</div>
                </div>
            </div>
            <div class="download-actions">
                <a class="btn btn-download hidden" id="downloadReport" href="#">📄 下载 Word 报告</a>
                <a class="btn btn-download hidden" id="downloadZip" href="#">📦 下载截图 ZIP</a>
            </div>
        </div>

        <!-- 错误区 -->
        <div class="card hidden" id="errorCard">
            <h3 style="margin-bottom:12px; color:#f87171">❌ 分析失败</h3>
            <div class="error-message" id="errorMessage"></div>
        </div>

        <div class="footer">
            视频风险点分析系统 V1 · 仅供本地使用 · AI 分析结果仅供参考
        </div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const fileName = document.getElementById('fileName');
        const uploadBtn = document.getElementById('uploadBtn');
        const uploadCard = document.getElementById('uploadCard');
        const progressCard = document.getElementById('progressCard');
        const resultCard = document.getElementById('resultCard');
        const errorCard = document.getElementById('errorCard');

        let selectedFile = null;
        let currentJobId = null;
        let pollTimer = null;

        // 点击上传区域
        uploadArea.addEventListener('click', () => fileInput.click());

        // 拖拽事件
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('drag-over');
        });
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('drag-over');
        });
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('drag-over');
            const files = e.dataTransfer.files;
            if (files.length > 0) handleFile(files[0]);
        });

        // 文件选择
        fileInput.addEventListener('change', () => {
            if (fileInput.files.length > 0) handleFile(fileInput.files[0]);
        });

        function handleFile(file) {
            const validExts = ['.mp4', '.mov', '.avi', '.mkv', '.webm'];
            const ext = '.' + file.name.split('.').pop().toLowerCase();
            if (!validExts.includes(ext)) {
                showToast('不支持的文件格式，请上传 mp4/mov/avi/mkv/webm 视频');
                return;
            }
            selectedFile = file;
            fileName.textContent = '📁 ' + file.name;
            fileName.classList.remove('hidden');
            uploadArea.classList.add('has-file');
            uploadBtn.classList.remove('hidden');
        }

        // 上传按钮
        uploadBtn.addEventListener('click', startUpload);

        async function startUpload() {
            if (!selectedFile) return;

            // 重置界面
            progressCard.classList.remove('hidden');
            resultCard.classList.add('hidden');
            errorCard.classList.add('hidden');
            uploadBtn.disabled = true;
            uploadBtn.textContent = '⏳ 上传中...';

            const formData = new FormData();
            formData.append('file', selectedFile);

            try {
                const resp = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData,
                });

                if (!resp.ok) {
                    const err = await resp.json();
                    throw new Error(err.detail || '上传失败');
                }

                const job = await resp.json();
                currentJobId = job.job_id;

                // 更新进度区
                updateProgress(job);
                uploadCard.classList.add('hidden');

                // 开始轮询
                startPolling();

            } catch (err) {
                showError(err.message);
                uploadBtn.disabled = false;
                uploadBtn.textContent = '🚀 开始分析';
            }
        }

        function startPolling() {
            if (pollTimer) clearInterval(pollTimer);
            pollTimer = setInterval(pollStatus, 1500);
        }

        async function pollStatus() {
            if (!currentJobId) return;

            try {
                const resp = await fetch(`/api/status/${currentJobId}`);
                if (!resp.ok) throw new Error('查询状态失败');

                const job = await resp.json();
                updateProgress(job);

                if (job.status === 'completed') {
                    clearInterval(pollTimer);
                    showResult(job);
                } else if (job.status === 'failed') {
                    clearInterval(pollTimer);
                    showError(job.error_message || '分析失败');
                }
            } catch (err) {
                console.error('轮询错误:', err);
            }
        }

        function updateProgress(job) {
            document.getElementById('progressBar').style.width = job.progress_percent + '%';
            document.getElementById('progressPercent').textContent = job.progress_percent + '%';
            document.getElementById('progressStage').textContent = job.stage || '处理中...';
            document.getElementById('progressMessage').textContent = job.message || '';
        }

        function showResult(job) {
            progressCard.classList.add('hidden');
            resultCard.classList.remove('hidden');

            document.getElementById('resultFilename').textContent = job.filename || '-';
            document.getElementById('resultDuration').textContent = formatDuration(job.duration_seconds);
            document.getElementById('resultResolution').textContent = job.resolution || '-';
            document.getElementById('resultRiskCount').textContent = job.risk_count || 0;

            const reportLink = document.getElementById('downloadReport');
            const zipLink = document.getElementById('downloadZip');

            if (job.report_url) {
                reportLink.href = job.report_url;
                reportLink.classList.remove('hidden');
            }
            if (job.screenshots_zip_url) {
                zipLink.href = job.screenshots_zip_url;
                zipLink.classList.remove('hidden');
            }
        }

        function showError(msg) {
            progressCard.classList.add('hidden');
            errorCard.classList.remove('hidden');
            document.getElementById('errorMessage').textContent = msg;
        }

        function formatDuration(seconds) {
            if (!seconds) return '-';
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = Math.floor(seconds % 60);
            if (h > 0) return `${h}时${m}分${s}秒`;
            return `${m}分${s}秒`;
        }

        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
    </script>
</body>
</html>
